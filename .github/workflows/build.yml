name: Build and push add-on image

on:
  push:
    branches: [main]
    paths:
      - worldmonitor/Dockerfile
      - worldmonitor/rootfs/**
      - .github/workflows/build.yml
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/worldmonitor-addon

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: |
          version=$(grep '^version:' worldmonitor/config.yaml | cut -d '"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./worldmonitor
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
